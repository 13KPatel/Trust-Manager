<body>
<div id="app"></div>
<script>
/*
================================================================
SETUP — 2 steps before deploying

STEP 1: Replace the two lines below with your Supabase credentials.
  Create a free project at https://supabase.com (pick EU/London region).
  Find these in: Project Settings > API

STEP 2: Run the SQL block below in your Supabase SQL Editor
  (Database > SQL Editor > New query, then paste and run).
================================================================
*/

var SUPABASE_URL = 'https://YOUR-PROJECT-ID.supabase.co';
var SUPABASE_ANON_KEY = 'YOUR-ANON-KEY-HERE';

/*
================================================================
SUPABASE SQL — paste and run once in SQL Editor
================================================================

create table if not exists user_trusts (
  trust_id text primary key,
  user_id uuid references auth.users not null,
  trust_data jsonb not null default '{}',
  updated_at timestamptz default now()
);

create index if not exists user_trusts_user_id_idx on user_trusts (user_id);

alter table user_trusts enable row level security;

create policy "users access own trusts only"
  on user_trusts for all
  using (auth.uid() = user_id);

================================================================
That's it. One table, one policy. The app stores each trust and
all its related data (beneficiaries, distributions, decisions,
accounts, gains) as a JSON document in trust_data.
================================================================
*/

// ============================================================
// APP STATE
// ============================================================
var SK="trust-manager-v2";
var TT=["Discretionary","Bare","Interest in Possession","Life Interest","Will Trust","Mixed","Charitable"];
var CO=["#1e40af","#059669","#d97706","#dc2626","#7c3aed","#0891b2","#be185d","#65a30d"];
var ME=["Bank Transfer","Cheque","Cash","In-Kind"];
var DCT=["Distribution","Investment","Tax","Administrative","Beneficiary Change","Trustee Change","Property","Other"];
var ITP=["Interest","Dividends","Rental Income","Sale Proceeds","Insurance","Other"];
var ECA=["Legal Fees","Accountancy","Tax Payment","Insurance","Property Maintenance","Bank Charges","Valuation","Other"];
var DTP=["Income - Non-Savings","Income - Savings","Income - Dividends","Capital"];
var NRB=325000;
var S={trusts:[],beneficiaries:[],trustees:[],distributions:[],decisions:[],income:[],expenses:[],gains:[]};
var AT=null,CV="dashboard",MT=null,MD={};

// Cloud sync state
var currentUser=null;
var syncStatus='idle'; // idle | syncing | saved | error | offline
var authStep='form';   // form | sent
var authEmail='';

// Init Supabase client
var sb=null;
var sbConfigured=(SUPABASE_URL.indexOf('YOUR-PROJECT-ID')===-1&&SUPABASE_URL.indexOf('YOUR-')===-1);
if(sbConfigured){
  try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);}catch(e){console.error('Supabase init failed:',e);sbConfigured=false;}
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fm(n){return"\u00A3"+Number(n).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmi(n){return"\u00A3"+Math.round(Number(n)).toLocaleString("en-GB")}
function fd(d){if(!d)return"\u2014";return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
function tdy(){return new Date().toISOString().split("T")[0]}
function dbt(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function opts(arr,sel){return arr.map(function(v){return'<option value="'+esc(v)+'"'+(v===sel?" selected":"")+'>'+esc(v)+'</option>'}).join("")}
function pct(n){return(n*100).toFixed(2)+"%"}

// ============================================================
// QUERY HELPERS
// ============================================================
function gt(){return S.trusts.find(function(t){return t.id===AT})||null}
function gbe(){return S.beneficiaries.filter(function(b){return b.trustId===AT})}
function gtr(){return S.trustees.filter(function(t){return t.trustId===AT})}
function gdi(){return S.distributions.filter(function(d){return d.trustId===AT}).sort(function(a,b){return new Date(b.date)-new Date(a.date)})}
function gdc(){return S.decisions.filter(function(d){return d.trustId===AT}).sort(function(a,b){return new Date(b.date)-new Date(a.date)})}
function gin(){return S.income.filter(function(i){return i.trustId===AT})}
function gex(){return S.expenses.filter(function(e){return e.trustId===AT})}
function gga(){return S.gains.filter(function(g){return g.trustId===AT})}
function bna(id){var b=gbe().find(function(v){return v.id===id});return b?b.name:"Unknown"}
function findItem(type,id){var map={trust:"trusts",beneficiary:"beneficiaries",trustee:"trustees",distribution:"distributions",decision:"decisions",income:"income",expense:"expenses",gain:"gains"};var key=map[type];if(!key)return{};var item=S[key].find(function(v){return v.id===id});return item?JSON.parse(JSON.stringify(item)):{}}

// ============================================================
// TAX CALCULATIONS (unchanged)
// ============================================================
function calcDistTax(dist,trust){
  var amt=Number(dist.amount),type=dist.distType||"Income - Non-Savings",tType=trust.type||"Discretionary";
  if(tType==="Bare")return{grossUp:amt,taxCredit:0,rate:0,note:"Bare trust: beneficiary taxed at own rates."};
  if(type==="Capital")return{grossUp:amt,taxCredit:0,rate:0,note:"Capital distribution. May trigger exit charge."};
  var rate=0.45;
  if(type==="Income - Dividends")rate=0.3935;
  if(tType==="Interest in Possession"||tType==="Life Interest")rate=type==="Income - Dividends"?0.0875:0.20;
  if(tType==="Discretionary"||tType==="Mixed"){var gu=amt/(1-rate);return{grossUp:gu,taxCredit:gu-amt,rate:rate,note:"Tax credit at "+pct(rate)+". Gross-up: "+fm(gu)+". Issue R185."};}
  return{grossUp:amt,taxCredit:amt*rate,rate:rate,note:tType+": trustees pay "+pct(rate)+". Life tenant declares gross on SA."};
}

function calcCGT(trust){
  var gains=gga(),st=Number(trust.settlorTrusts||1),fullAEA=1500;
  var aea=st>=5?Math.max(300,fullAEA/st):fullAEA/st;
  var tg=0,tl=0;
  gains.forEach(function(g){var a=Number(g.amount);if(a>=0)tg+=a;else tl+=Math.abs(a)});
  var net=Math.max(0,tg-tl),taxable=Math.max(0,net-aea),tax=taxable*0.24;
  return{tg:tg,tl:tl,net:net,aea:Math.round(aea*100)/100,taxable:taxable,tax:tax,lc:Math.max(0,tl-tg),st:st};
}

function calc10Y(trust){
  var val=Number(trust.currentValue||trust.initialValue||0),clts=Number(trust.settlorPriorCLTs||0);
  var avNRB=Math.max(0,NRB-clts);
  var capDist=gdi().filter(function(d){return(d.distType||"")==="Capital"}).reduce(function(s,d){return s+Number(d.amount)},0);
  var hyp=val+capDist,excess=Math.max(0,hyp-avNRB);
  var taxLife=excess*0.20,effRate=hyp>0?taxLife/hyp:0,perRate=effRate*0.3,taxDue=val*perRate;
  return{val:val,clts:clts,avNRB:avNRB,capDist:capDist,hyp:hyp,excess:excess,effRate:effRate,perRate:perRate,taxDue:taxDue,needsReturn:hyp>(NRB*0.8)};
}

function calcExit(trust,amt,date){
  var t=gt();if(!t||!t.established||!date)return null;
  var start=new Date(t.established),exit=new Date(date);
  var yrs=(exit-start)/(365.25*24*60*60*1000),dec=Math.floor(yrs/10);
  var pStart=new Date(start);if(dec>0)pStart.setFullYear(pStart.getFullYear()+dec*10);
  var days=(exit-pStart)/(24*60*60*1000),qtrs=Math.floor(days/91.3125);
  if(qtrs<1)return{tax:0,qtrs:0,rate:0,note:"First quarter — no exit charge."};
  if(qtrs>40)qtrs=40;
  var tenY=calc10Y(trust),exitRate=tenY.perRate*(qtrs/40),tax=Number(amt)*exitRate;
  return{tax:tax,qtrs:qtrs,rate:exitRate,note:dec===0?"Pre-first-anniversary rate.":"Based on last 10-year effective rate."};
}

function gs(){
  var t=gt();if(!t)return null;
  var ds=gdi(),ic=gin(),ex=gex(),bs=gbe();
  var tD=ds.reduce(function(s,d){return s+Number(d.amount)},0);
  var tI=ic.reduce(function(s,i){return s+Number(i.amount)},0);
  var tE=ex.reduce(function(s,e){return s+Number(e.amount)},0);
  var bal=Number(t.initialValue||0)+tI-tD-tE;
  var pb=bs.map(function(b){var bd=ds.filter(function(d){return d.beneficiaryId===b.id});return{id:b.id,name:b.name,total:bd.reduce(function(s,d){return s+Number(d.amount)},0)}});
  var kd=[];
  if(t.established){
    var est=new Date(t.established);
    for(var i=1;i<=5;i++){var a=new Date(est);a.setFullYear(a.getFullYear()+i*10);if(a>new Date()){
      kd.push({date:a.toISOString().split("T")[0],label:(i*10)+"-Year Anniversary Charge",du:dbt(tdy(),a.toISOString().split("T")[0]),type:"iht"});
      var fl=new Date(a);fl.setMonth(fl.getMonth()+7);fl.setDate(0);
      kd.push({date:fl.toISOString().split("T")[0],label:"IHT100 Filing + Payment Deadline",du:dbt(tdy(),fl.toISOString().split("T")[0]),type:"iht"});break;
    }}
    var nw=new Date(),yr=nw.getMonth()>=1?nw.getFullYear()+1:nw.getFullYear();
    kd.push({date:yr+"-10-31",label:"SA900 Paper Deadline ("+(yr-1)+"/"+yr+")",du:dbt(tdy(),yr+"-10-31"),type:"tax"});
    kd.push({date:yr+"-01-31",label:"SA900 Electronic + Payment ("+(yr-1)+"/"+yr+")",du:dbt(tdy(),yr+"-01-31"),type:"tax"});
    kd.push({date:null,label:"TRS: Update within 90 days of changes",du:null,type:"compliance"});
    kd.push({date:yr+"-07-05",label:"Issue R185 to beneficiaries ("+(yr-1)+"/"+(yr)+")",du:dbt(tdy(),yr+"-07-05"),type:"admin"});
  }
  kd.sort(function(a,b){return(a.du===null?9999:a.du)-(b.du===null?9999:b.du)});
  return{tD:tD,tI:tI,tE:tE,bal:bal,pb:pb,kd:kd};
}

function dpc(d){if(d<60)return"background:#fef2f2;color:#dc2626";if(d<180)return"background:#fffbeb;color:#d97706";return"background:#f0fdf4;color:#059669"}
function dtc(tp){return{iht:"background:#faf5ff;color:#7c3aed",tax:"background:#fef2f2;color:#dc2626",compliance:"background:#fffbeb;color:#d97706",admin:"background:#eff6ff;color:#1e40af"}[tp]||"background:#eff6ff;color:#1e40af"}

// ============================================================
// CLOUD SYNC
// ============================================================

function syncStatusHTML(){
  if(syncStatus==='syncing')return'<span style="font-size:11px;color:rgba(255,255,255,0.5)">\u2191 saving</span>';
  if(syncStatus==='saved')return'<span style="font-size:11px;color:#4ade80">\u2713 saved</span>';
  if(syncStatus==='error')return'<span style="font-size:11px;color:#fca5a5">! sync error</span>';
  if(syncStatus==='offline')return'<span style="font-size:11px;color:#fcd34d">offline</span>';
  return'';
}

// Build the trust document to upsert for one trust
function buildTrustDoc(trustId){
  var trust=S.trusts.find(function(t){return t.id===trustId});
  if(!trust)return null;
  return{
    trust:trust,
    beneficiaries:S.beneficiaries.filter(function(b){return b.trustId===trustId}),
    trustees:S.trustees.filter(function(t){return t.trustId===trustId}),
    distributions:S.distributions.filter(function(d){return d.trustId===trustId}),
    decisions:S.decisions.filter(function(d){return d.trustId===trustId}),
    income:S.income.filter(function(i){return i.trustId===trustId}),
    expenses:S.expenses.filter(function(e){return e.trustId===trustId}),
    gains:S.gains.filter(function(g){return g.trustId===trustId})
  };
}

async function saveTrustToCloud(trustId){
  if(!currentUser||!sb||!trustId)return;
  var doc=buildTrustDoc(trustId);
  if(!doc)return;
  var{error}=await sb.from('user_trusts').upsert({
    trust_id:trustId,
    user_id:currentUser.id,
    trust_data:doc,
    updated_at:new Date().toISOString()
  },{onConflict:'trust_id'});
  if(error)throw error;
}

async function loadFromCloud(){
  if(!currentUser||!sb){R();return;}
  var uid=currentUser.id;
  syncStatus='syncing';

  // One-time migration: push existing localStorage data up to cloud
  var migratedKey=SK+'-cloud-v1';
  if(!localStorage.getItem(migratedKey)){
    var cached=localStorage.getItem(SK);
    if(cached){
      try{
        var p=JSON.parse(cached);
        var tmp={trusts:[],beneficiaries:[],trustees:[],distributions:[],decisions:[],income:[],expenses:[],gains:[]};
        Object.keys(tmp).forEach(function(k){if(p[k]&&p[k].length>0)tmp[k]=p[k];});
        if(tmp.trusts.length>0){
          var ops=tmp.trusts.map(function(t){
            var doc={trust:t,beneficiaries:tmp.beneficiaries.filter(function(b){return b.trustId===t.id}),trustees:tmp.trustees.filter(function(tr){return tr.trustId===t.id}),distributions:tmp.distributions.filter(function(d){return d.trustId===t.id}),decisions:tmp.decisions.filter(function(d){return d.trustId===t.id}),income:tmp.income.filter(function(i){return i.trustId===t.id}),expenses:tmp.expenses.filter(function(e){return e.trustId===t.id}),gains:tmp.gains.filter(function(g){return g.trustId===t.id})};
            return sb.from('user_trusts').upsert({trust_id:t.id,user_id:uid,trust_data:doc,updated_at:new Date().toISOString()},{onConflict:'trust_id'});
          });
          await Promise.all(ops);
        }
      }catch(e){console.warn('Migration error:',e);}
    }
    localStorage.setItem(migratedKey,'1');
  }

  try{
    var{data,error}=await sb.from('user_trusts').select('trust_id,trust_data').eq('user_id',uid);
    if(error)throw error;

    S={trusts:[],beneficiaries:[],trustees:[],distributions:[],decisions:[],income:[],expenses:[],gains:[]};
    if(data){
      data.forEach(function(row){
        var td=row.trust_data;
        if(td.trust)S.trusts.push(td.trust);
        if(td.beneficiaries)S.beneficiaries=S.beneficiaries.concat(td.beneficiaries);
        if(td.trustees)S.trustees=S.trustees.concat(td.trustees);
        if(td.distributions)S.distributions=S.distributions.concat(td.distributions);
        if(td.decisions)S.decisions=S.decisions.concat(td.decisions);
        if(td.income)S.income=S.income.concat(td.income);
        if(td.expenses)S.expenses=S.expenses.concat(td.expenses);
        if(td.gains)S.gains=S.gains.concat(td.gains);
      });
    }
    try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
    syncStatus='saved';
    if(S.trusts.length>0&&!AT)AT=S.trusts[0].id;
  }catch(e){
    console.warn('Cloud load failed, using localStorage:',e);
    syncStatus='offline';
    try{
      var cached2=localStorage.getItem(SK);
      if(cached2){var p2=JSON.parse(cached2);Object.keys(S).forEach(function(k){if(p2[k])S[k]=p2[k];});if(S.trusts.length>0)AT=S.trusts[0].id;}
    }catch(e2){}
  }
  R();
}

// sv() — save to localStorage immediately, sync active trust to cloud in background
function sv(){
  try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
  if(currentUser&&sb&&AT){
    syncStatus='syncing';
    var el=document.getElementById('sync-status');
    if(el)el.innerHTML=syncStatusHTML();
    saveTrustToCloud(AT).then(function(){
      syncStatus='saved';
      var el2=document.getElementById('sync-status');
      if(el2)el2.innerHTML=syncStatusHTML();
    }).catch(function(e){
      console.warn('Sync error:',e);
      syncStatus='error';
      var el3=document.getElementById('sync-status');
      if(el3)el3.innerHTML=syncStatusHTML();
    });
  }
}

// ============================================================
// AUTH FUNCTIONS
// ============================================================

window.sendMagicLink=async function(){
  var emailEl=document.getElementById('auth-email');
  var email=(emailEl?emailEl.value:'').trim();
  if(!email)return;
  authEmail=email;
  var btn=document.getElementById('magic-btn');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try{
    var res=await sb.auth.signInWithOtp({email:email,options:{emailRedirectTo:window.location.href}});
    if(res.error)throw res.error;
    authStep='sent';
    R();

          var rc=st?((st.pb.find(function(v){return v.id===b.id})||{}).total||0):0;
          h+='<div class="card card-click" onclick="om(\'beneficiary\',\''+esc(b.id)+'\')"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:12px"><div style="width:36px;height:36px;border-radius:20px;background:'+CO[i%CO.length]+'22;color:'+CO[i%CO.length]+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px">'+esc(b.name.charAt(0))+'</div><div><div style="font-weight:700;font-size:14px">'+esc(b.name)+(b.taxBand?' <span class="badge" style="background:#eff6ff;color:#1e40af">'+esc(b.taxBand)+'</span>':'')+'</div><div style="font-size:12px;color:#64748b">'+esc(b.relationship||"")+(b.dob?' \u00B7 '+fd(b.dob):'')+'</div></div></div><div style="text-align:right"><div style="font-weight:700">'+fm(rc)+'</div><div style="font-size:11px;color:#64748b">received</div></div></div></div>';
        });
        h+='<div style="margin-bottom:28px"></div>';
      }
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h2 style="font-size:20px">Trustees</h2><button class="btn btn-accent btn-sm" onclick="om(\'trustee\')">+ Add</button></div>';
      var ts=gtr();
      if(ts.length===0)h+='<div class="card" style="text-align:center;color:#64748b">No trustees</div>';
      else ts.forEach(function(tr){h+='<div class="card card-click" onclick="om(\'trustee\',\''+esc(tr.id)+'\')"><div style="font-weight:700;font-size:14px">'+esc(tr.name)+(tr.professional?' <span class="badge" style="background:#eff6ff;color:#1e40af">Professional</span>':'')+'</div><div style="font-size:12px;color:#64748b">'+esc(tr.role)+' \u00B7 Appointed '+fd(tr.appointedDate)+'</div></div>'});
    }

    // COMPLIANCE
    if(CV==="dates"){
      h+='<h2 style="font-size:20px;margin-bottom:4px">Compliance Calendar</h2><p style="font-size:13px;color:#64748b;margin-bottom:18px">'+esc(t.name)+'</p>';
      if(st)st.kd.forEach(function(d){h+='<div class="card" style="display:flex;justify-content:space-between;align-items:center"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span class="badge" style="'+dtc(d.type)+'">'+esc(d.type)+'</span><span style="font-weight:700;font-size:14px">'+esc(d.label)+'</span></div><div style="font-size:12px;color:#64748b">'+(d.date?fd(d.date):"Ongoing")+'</div></div>'+(d.du!==null?'<div style="text-align:right;min-width:60px"><div style="font-size:20px;font-weight:700;color:'+(d.du<60?"#dc2626":d.du<180?"#d97706":"#059669")+'">'+d.du+'d</div><div style="font-size:10px;color:#64748b">left</div></div>':'')+'</div>'});
      h+='<div class="warn"><div class="wt">Trustee Obligations</div><div class="wb">\u2022 File SA900 annually (paper 31 Oct / electronic 31 Jan)<br>\u2022 Register + update TRS within 90 days of changes<br>\u2022 Issue R185 to beneficiaries each tax year<br>\u2022 File IHT100 within 6 months of 10-year anniversary<br>\u2022 Report CGT on residential property within 60 days<br>\u2022 Keep records of all transactions and decisions<br>\u2022 Act in beneficiaries\' best interests (Trustee Act 2000)<br>\u2022 Review investments prudently</div></div>';
    }

    h+='</div>'; // end .content
  }

  // App-level modals (edit/add forms)
  if(MT){
    h+='<div class="modal-bg" onclick="cm()"><div class="modal" onclick="event.stopPropagation()"><div class="mh"><h3>'+modalTitle()+'</h3><button class="mc" onclick="cm()">\u00D7</button></div>'+modalBody()+'</div></div>';
  }

  // Auth overlay — shown when Supabase is configured but user is not logged in
  if(sbConfigured&&!currentUser){
    h+='<div class="auth-overlay">';
    h+='<div class="auth-box">';
    h+='<h2 style="font-size:22px;font-weight:700;margin-bottom:6px">Trust Manager</h2>';
    h+='<p style="font-size:13px;color:#64748b;line-height:1.6;margin-bottom:22px">Your trust records, secured and synced across all your devices.</p>';

    if(authStep==='sent'){
      h+='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:20px;text-align:center">';
      h+='<div style="font-size:32px;margin-bottom:8px">\u2709\uFE0F</div>';
      h+='<div style="font-size:15px;font-weight:700;color:#166534;margin-bottom:6px">Check your email</div>';
      h+='<div style="font-size:13px;color:#166534">We sent a sign-in link to<br><strong>'+esc(authEmail)+'</strong></div>';
      h+='</div>';
      h+='<div style="margin-top:16px;text-align:center"><button onclick="resetAuth()" style="background:none;border:none;color:#94a3b8;font-size:12px;cursor:pointer;text-decoration:underline">Use a different email address</button></div>';
    } else {
      h+='<div class="fg"><label class="label">Email address</label><input class="input" type="email" id="auth-email" placeholder="you@example.com" onkeydown="if(event.key===\'Enter\')sendMagicLink()" autocomplete="email"></div>';
      h+='<button id="magic-btn" class="btn btn-primary" onclick="sendMagicLink()" style="width:100%;padding:12px">Send magic link</button>';
      h+='<div id="auth-err" style="display:none;margin-top:10px;font-size:12px;color:#991b1b;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px"></div>';
      h+='<p style="font-size:11px;color:#94a3b8;margin-top:16px;text-align:center;line-height:1.6">A one-click sign-in link will be emailed to you.<br>No password. No app to download.</p>';
    }

    h+='</div></div>'; // end auth-box, auth-overlay
  }

  app.innerHTML=h;
}

// ============================================================
// INIT
// ============================================================
async function init(){
  if(sbConfigured&&sb){
    try{
      var res=await sb.auth.getSession();
      if(res.data&&res.data.session){
        currentUser=res.data.session.user;
        await loadFromCloud();
        return;
      }
    }catch(e){console.warn('Session check failed:',e);}
  }
  // Not configured or no session — load from localStorage
  try{
    var s=localStorage.getItem(SK);
    if(s){var p=JSON.parse(s);Object.keys(S).forEach(function(k){if(p[k])S[k]=p[k]});if(S.trusts.length>0)AT=S.trusts[0].id}
  }catch(e){}
  R();
}

init();
</script>
