<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f7f5f2;color:#1e293b;min-height:100vh;-webkit-text-size-adjust:100%}
h1,h2,h3{font-weight:700}
button{font-family:inherit}
.header{background:#1e293b;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50}
.header h1{color:#fff;font-size:18px}
.header-sub{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.header select{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:6px 10px;color:#fff;font-size:13px;outline:none}
.header select option{color:#000}
.btn{border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;padding:10px 20px}
.btn:active{opacity:0.7}
.btn-primary{background:#1e293b;color:#fff}
.btn-accent{background:#1e40af;color:#fff}
.btn-ghost{background:transparent;color:#64748b;border:1px solid #e5e1dc}
.btn-danger{background:transparent;color:#dc2626;border:1px solid #fecaca}
.btn-header{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.btn-sm{padding:6px 14px;font-size:12px}
.card{background:#fff;border:1px solid #e5e1dc;border-radius:12px;padding:18px 20px;margin-bottom:10px}
.card-click{cursor:pointer}
.card-click:active{border-color:#cbd5e1}
.tabs{display:flex;border-bottom:1px solid #e5e1dc;padding:14px 20px 0;overflow-x:auto;gap:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 0;margin-right:16px;border:none;background:none;border-bottom:2px solid transparent;color:#64748b;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap}
.tab.active{color:#1e293b;font-weight:700;border-bottom-color:#1e293b}
.content{max-width:960px;margin:0 auto;padding:20px 20px 60px}
.label{font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px;display:block}
.input,.sel,.textarea{background:#faf9f7;border:1px solid #e5e1dc;border-radius:8px;padding:10px 14px;color:#1e293b;font-size:14px;font-family:inherit;outline:none;width:100%;box-sizing:border-box}
.input:focus,.sel:focus,.textarea:focus{border-color:#1e40af}
.sel{cursor:pointer}
.textarea{min-height:80px;resize:vertical;line-height:1.6}
.fg{margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kl{font-size:10px;letter-spacing:1.5px;color:#64748b;text-transform:uppercase;margin-bottom:4px}
.kv{font-size:20px;font-weight:700}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:540px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.18)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mh h3{font-size:18px}
.mc{background:none;border:none;font-size:22px;color:#64748b;cursor:pointer;padding:4px}
.empty{text-align:center;padding:50px 20px;color:#64748b}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.warn{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:16px;margin-top:16px}
.wt{font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px}
.wb{font-size:12px;color:#92400e;line-height:1.7}
.info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px;margin-bottom:14px}
.info-t{font-size:12px;font-weight:700;color:#1e40af;margin-bottom:3px}
.info-b{font-size:12px;color:#1e40af;line-height:1.6}
.tax-result{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;margin-bottom:14px}
.tax-result.warning{background:#fef2f2;border-color:#fecaca}
.tax-result .tr-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#64748b;margin-bottom:4px}
.tax-result .tr-value{font-size:22px;font-weight:700;color:#059669}
.tax-result.warning .tr-value{color:#dc2626}
.tax-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e5e1dc;font-size:13px}
.tax-row:last-child{border-bottom:none}
.tax-row span:last-child{font-weight:700}
.auth-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-box{background:#fff;border-radius:16px;padding:32px 28px;max-width:400px;width:100%}
/* Onboarding home page */
.ob-step{display:flex;gap:14px;padding:16px 18px;background:#fff;border:1px solid #e5e1dc;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.ob-step:active{opacity:0.85}
.ob-step.active-step{border-color:#1e40af;border-left:3px solid #1e40af}
.ob-step.done-step{border-color:#e5e1dc;background:#fafaf9}
.ob-step.pending-step{opacity:0.55;cursor:default}
.ob-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px}
.ob-num.done{background:#dcfce7;color:#166534}
.ob-num.active{background:#1e40af;color:#fff}
.ob-num.pending{background:#f1f5f9;color:#94a3b8}
.ob-body{flex:1;min-width:0}
.ob-title{font-size:14px;font-weight:700;margin-bottom:3px}
.ob-desc{font-size:12px;color:#64748b;line-height:1.6}
.ob-cta{font-size:12px;font-weight:600;color:#1e40af;margin-top:6px;display:inline-block}
.ob-tick{font-size:18px;flex-shrink:0;align-self:center}
.about-box{background:#1e293b;border-radius:14px;padding:24px;margin-bottom:20px;color:#fff}
.about-box h2{font-size:18px;margin-bottom:8px;color:#fff}
.about-box p{font-size:13px;color:rgba(255,255,255,0.7);line-height:1.75}
.about-box .ab-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.about-box .ab-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
/* Guide page */
.guide-search{background:#fff;border:1px solid #e5e1dc;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;width:100%;margin-bottom:12px}
.guide-search:focus{border-color:#1e40af}
.gcats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.gcat{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid #e5e1dc;background:#fff;color:#64748b;cursor:pointer;font-weight:500;white-space:nowrap}
.gcat.active{background:#1e293b;color:#fff;border-color:#1e293b}
.ge{background:#fff;border:1px solid #e5e1dc;border-radius:12px;margin-bottom:8px;overflow:hidden}
.ge-head{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;cursor:pointer}
.ge-head:hover{background:#fafaf9}
.ge-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.ge-title{font-size:14px;font-weight:700;flex:1}
.ge-summary{font-size:12px;color:#64748b;margin-top:2px;line-height:1.5}
.ge-chevron{font-size:16px;color:#94a3b8;flex-shrink:0;transition:transform .2s}
.ge-chevron.open{transform:rotate(180deg)}
.ge-body{display:none;padding:0 16px 16px;border-top:1px solid #f1f5f9}
.ge-body.open{display:block}
.ge-body p{font-size:13px;color:#475569;line-height:1.75;margin-top:12px}
.ge-body p:first-child{margin-top:12px}
.ge-body strong{color:#1e293b;font-weight:600}
.ge-example{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-top:12px}
.ge-example-label{font-size:10px;font-weight:700;letter-spacing:1px;color:#1e40af;text-transform:uppercase;margin-bottom:8px}
.ge-example p{font-size:12px;color:#334155;line-height:1.7;margin-top:0}
.ge-example p+p{margin-top:6px}
.guide-empty{text-align:center;padding:40px 20px;color:#64748b;font-size:13px}
.cat-header{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#64748b;text-transform:uppercase;margin:20px 0 8px 2px}
.cat-header:first-child{margin-top:0}
@media(max-width:600px){.g2,.g3,.g4,.two-col{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr}.header{padding:12px 16px}.tabs{padding:10px 16px 0}.content{padding:16px 16px 60px}.ob-step{gap:10px}}

<div id="app"></div>
<script>
/*
================================================================
SETUP — 2 steps before deploying

STEP 1: Replace the two lines below with your Supabase credentials.
  Create a free project at https://supabase.com (pick EU/London region).
  Find these in: Project Settings > API

STEP 2: Run this SQL in your Supabase SQL Editor:

create table if not exists user_trusts (
  trust_id text primary key,
  user_id uuid references auth.users not null,
  trust_data jsonb not null default '{}',
  updated_at timestamptz default now()
);
create index if not exists user_trusts_user_id_idx on user_trusts (user_id);
alter table user_trusts enable row level security;
create policy "users access own trusts only"
  on user_trusts for all using (auth.uid() = user_id);

================================================================
*/

var SUPABASE_URL = 'https://YOUR-PROJECT-ID.supabase.co';
var SUPABASE_ANON_KEY = 'YOUR-ANON-KEY-HERE';

// ============================================================
// APP STATE
// ============================================================
var SK="trust-manager-v2";
var DATA_VERSION=1; // bump this if the saved-data shape ever changes
var TT=["Discretionary","Bare","Interest in Possession","Life Interest","Will Trust","Mixed","Charitable"];
var CO=["#1e40af","#059669","#d97706","#dc2626","#7c3aed","#0891b2","#be185d","#65a30d"];
var ME=["Bank Transfer","Cheque","Cash","In-Kind"];
var DCT=["Distribution","Investment","Tax","Administrative","Beneficiary Change","Trustee Change","Property","Other"];
var ITP=["Interest","Dividends","Rental Income","Sale Proceeds","Insurance","Other"];
var ECA=["Legal Fees","Accountancy","Tax Payment","Insurance","Property Maintenance","Bank Charges","Valuation","Other"];
var DTP=["Income - Non-Savings","Income - Savings","Income - Dividends","Capital"];
var NRB=325000;
var S={trusts:[],beneficiaries:[],trustees:[],distributions:[],decisions:[],income:[],expenses:[],gains:[]};
var AT=null,CV="home",MT=null,MD={};
var currentUser=null;
var syncStatus='idle';
var authStep='form';
var authEmail='';
var sb=null;
var sbConfigured=(SUPABASE_URL.indexOf('YOUR-PROJECT-ID')===-1&&SUPABASE_URL.indexOf('YOUR-')===-1);
var GQ=''; // guide search query
var GC='all'; // guide category filter

// ============================================================
// GUIDE DATA
// ============================================================
var GD=[
  // TRUST TYPES
  {id:'discretionary',cat:'trust-types',color:'#7c3aed',title:'Discretionary trust',summary:'Trustees decide who benefits, how much, and when.',
   body:'<p>A discretionary trust gives the trustees complete flexibility. No single beneficiary has a fixed right to any income or capital — trustees decide how to distribute funds from a class of potential beneficiaries named in the deed.</p><p>This flexibility makes discretionary trusts the most common choice for IHT planning, but it comes with the most complex tax treatment. The trust is taxed as a separate entity at the <strong>Rate Applicable to Trusts</strong> (45% on income, 39.35% on dividends). Trustees must issue an <strong>R185 certificate</strong> to beneficiaries when distributing income.</p><p>For IHT, discretionary trusts sit inside the <strong>relevant property regime</strong> — meaning they face a 10-year periodic charge and exit charges when capital leaves.</p>',
   example:'<p>The Smith Family Trust has three potential beneficiaries: two adult children and a grandchild. Each year, trustees review the family\'s circumstances and decide whether to distribute income and how much to each person. One year they may give everything to the grandchild for school fees; the next year nothing at all. That discretion is protected by the trust deed.</p>'},
  {id:'bare',cat:'trust-types',color:'#059669',title:'Bare trust',summary:'Beneficiary owns the assets outright — the trustee is just a nominee.',
   body:'<p>A bare trust is the simplest form. The beneficiary has an <strong>absolute, immediate right</strong> to both the income and the capital. The trustee holds the assets in name only — they cannot exercise any discretion over how or when assets are distributed.</p><p>Bare trusts are <strong>transparent for tax purposes</strong> — HMRC treats the assets as if the beneficiary owns them directly. The beneficiary pays tax on income and gains at their own rates, not the trust rates. This makes bare trusts tax-efficient if the beneficiary is a basic-rate taxpayer or non-taxpayer.</p><p>Commonly used to hold assets for children until they turn 18, or for straightforward nominee arrangements.</p>',
   example:'<p>A parent sets up a bare trust holding £50,000 of shares for their child. The child has an absolute right to the shares and all dividends. When the child turns 18, the parent (as trustee) simply transfers the shares into the child\'s own name. Any dividends paid during the trust are taxed on the child, not the parent.</p>'},
  {id:'iip',cat:'trust-types',color:'#0891b2',title:'Interest in possession trust',summary:'One beneficiary has the right to income now; others receive capital later.',
   body:'<p>In an interest in possession (IIP) trust, the <strong>life tenant</strong> has a legal right to receive all the income from the trust assets as it arises. A second group of beneficiaries (called <strong>remaindermen</strong>) will receive the capital when the trust ends — usually on the life tenant\'s death.</p><p>The trust pays income tax at basic rate (20%) on non-savings income and 8.75% on dividends. The life tenant then declares the gross income on their own Self Assessment return and claims credit for the tax already paid. This means the effective rate matches the life tenant\'s own marginal rate.</p><p>For IHT purposes, if the IIP arose before 22 March 2006, the assets are treated as part of the life tenant\'s estate — <strong>not</strong> the relevant property regime. Post-2006 IIPs in new trusts are generally treated as relevant property unless they qualify as an IPDI.</p>',
   example:'<p>A widow is the life tenant of her late husband\'s will trust. She receives all income (rental income from a property held in trust) during her lifetime. On her death, the property passes to their children. The property is treated as part of her estate for IHT, not subject to the 10-year periodic charge.</p>'},
  {id:'will-trust',cat:'trust-types',color:'#d97706',title:'Will trust',summary:'Created by a will — comes into existence when the testator dies.',
   body:'<p>A will trust (also called a testamentary trust) is set up by the terms of someone\'s will. It only comes into existence when the person dies and their estate is administered. The deceased\'s personal representatives transfer the relevant assets into the trust.</p><p>Common types include trusts for minor children (so they don\'t inherit outright at 18) and trusts for a surviving spouse with children from a previous relationship. The tax treatment depends entirely on what type of trust the will creates — discretionary, IIP, bare, etc.</p><p>An <strong>Immediate Post-Death Interest (IPDI)</strong> is a special category: an IIP that arises immediately from a will trust. The assets are treated as part of the life tenant\'s estate for IHT, not as relevant property.</p>',
   example:'<p>A father\'s will leaves his estate in trust for his three children, to be distributed when the youngest turns 25. Until then, trustees can apply income for the children\'s education and maintenance (s.31 Trustee Act 1925 power). This is a discretionary will trust — the 10-year periodic charge will apply from the 10th anniversary of the father\'s death.</p>'},
  {id:'charitable',cat:'trust-types',color:'#be185d',title:'Charitable trust',summary:'Established for charitable purposes — exempt from most UK tax.',
   body:'<p>A charitable trust must exist solely for purposes that are charitable under the Charities Act 2011 (relief of poverty, education, religion, health, community benefit, etc.). It must register with the Charity Commission if its income exceeds £5,000 a year.</p><p>Charitable trusts are exempt from income tax on most income, exempt from CGT, and entirely outside the IHT relevant property regime — no 10-year charges, no exit charges. Donations to the trust may also qualify for Gift Aid, increasing their value by 25%.</p><p>Trustees of charitable trusts have additional obligations under charity law, including annual accounts filed with the Charity Commission and a duty to further the charitable objects only.</p>',
   example:''},

  // PEOPLE
  {id:'settlor',cat:'people',color:'#1e40af',title:'Settlor',summary:'The person who creates the trust and puts assets into it.',
   body:'<p>The settlor is the person who sets up the trust and transfers assets into it. In a family trust, this is usually a parent or grandparent doing IHT planning. In a will trust, the settlor is the deceased person.</p><p>The settlor\'s personal tax position matters significantly to the trust\'s tax calculations. Specifically: any <strong>Chargeable Lifetime Transfers (CLTs)</strong> the settlor made in the 7 years before setting up this trust reduce the nil-rate band available to the trust for its 10-year periodic charge. The number of trusts the settlor has created also affects the CGT Annual Exempt Amount each trust gets.</p><p>If the settlor (or their spouse) can benefit from the trust — even indirectly — it becomes a <strong>settlor-interested trust</strong>, which has very different income tax treatment (all income is taxed on the settlor at their marginal rate).</p>',
   example:''},
  {id:'trustee',cat:'people',color:'#1e40af',title:'Trustee',summary:'Legally responsible for managing the trust — you.',
   body:'<p>Trustees hold the trust assets in their own names but for the benefit of the beneficiaries. You have personal legal responsibility for every decision made in the administration of the trust. This is not a formality — if you breach your duties, you can be personally liable to the beneficiaries for any loss caused.</p><p>Your key duties under the <strong>Trustee Act 2000</strong> are: to exercise reasonable care and skill; to invest prudently using the standard investment criteria; to keep proper accounts and records; and to act in the best interests of all beneficiaries (both present and future).</p><p>There is no legal minimum or maximum number of trustees, but most trusts have two to four. A sole trustee can act, but it is not advisable — having at least two trustees provides a safeguard and is required for some transactions (e.g. receipt of capital money from land).</p>',
   example:''},
  {id:'beneficiary',cat:'people',color:'#1e40af',title:'Beneficiary',summary:'The person or people who benefit from the trust assets.',
   body:'<p>Beneficiaries are those who are entitled (or potentially entitled) to benefit from the trust. In a discretionary trust, beneficiaries have no automatic right to anything — trustees decide who gets what. In a bare trust or IIP trust, beneficiaries have fixed entitlements.</p><p>Beneficiaries of discretionary trusts do not have an automatic right to see the trust accounts, but courts can order disclosure. Keeping clear records protects trustees from disputes.</p><p>Each beneficiary\'s own tax position matters when planning distributions — a basic-rate taxpayer beneficiary receiving income from a discretionary trust can reclaim some of the 45% tax credit paid by the trust, whereas a non-taxpayer may be able to reclaim it all.</p>',
   example:''},
  {id:'protector',cat:'people',color:'#1e40af',title:'Protector',summary:'An optional appointment with powers to oversee or veto trustee decisions.',
   body:'<p>A protector is a person named in the trust deed with specific powers — typically to remove and replace trustees, or to veto certain decisions (such as adding beneficiaries or making large capital distributions). Not all trusts have a protector; it is an optional feature more common in offshore or complex family trusts.</p><p>The role is a safeguard for the settlor: it allows someone trusted by the settlor to keep oversight without being a trustee themselves. The powers of a protector are defined entirely by the trust deed — there is no standard statutory role.</p>',
   example:''},

  // TAX
  {id:'clt',cat:'tax',color:'#dc2626',title:'Chargeable lifetime transfer (CLT)',summary:'A gift into a discretionary trust — it uses up the nil-rate band.',
   body:'<p>When a settlor transfers assets into a discretionary trust while alive, HMRC treats this as a <strong>Chargeable Lifetime Transfer (CLT)</strong>. CLTs are added together on a rolling 7-year basis. If cumulative CLTs exceed the nil-rate band (£325,000), the excess is charged to IHT at <strong>20%</strong> on entry into the trust (the "entry charge").</p><p>CLTs matter beyond the entry charge. In the 7 years before the trust was established, any prior CLTs the settlor made eat into the nil-rate band available for the trust\'s 10-year periodic charge. This is why the "Settlor Prior CLTs" field in the trust setup is important — entering an incorrect figure will give the wrong periodic charge calculation.</p><p>After 7 years, a CLT drops out of the cumulative total — so older gifts become irrelevant for future calculations.</p>',
   example:'<p><strong>Entry charge example:</strong></p><p>Settlor has made no prior CLTs. They put £500,000 into a discretionary trust. The NRB is £325,000. The excess is £175,000. Entry charge = £175,000 × 20% = <strong>£35,000</strong> due on setting up the trust.</p><p>If they had made prior CLTs of £200,000 within 7 years, only £125,000 NRB would remain. Excess = £375,000. Entry charge = £375,000 × 20% = <strong>£75,000</strong>.</p>'},
  {id:'nrb',cat:'tax',color:'#dc2626',title:'Nil-rate band (NRB)',summary:'The threshold below which no IHT is charged — currently £325,000.',
   body:'<p>The nil-rate band is the amount anyone can transfer — whether in life or on death — before IHT applies. It has been frozen at <strong>£325,000</strong> since 2009 and is currently frozen until at least 2030.</p><p>Everyone has their own nil-rate band. For trusts, the NRB available to the trust for its 10-year periodic charge is reduced by any CLTs the settlor made in the 7 years before creating the trust.</p><p>The <strong>Residence Nil-Rate Band (RNRB)</strong> of up to £175,000 is an additional allowance for passing a family home to direct descendants — but it is not available to assets held in discretionary trusts. This is a significant planning point if the trust holds property.</p>',
   example:'<p>A settlor created Trust A in 2018 with £150,000 (a CLT). In 2023 they create Trust B with £400,000. When calculating Trust B\'s 10-year periodic charge: the NRB available to Trust B = £325,000 − £150,000 (prior CLT, within 7 years) = <strong>£175,000</strong>. The periodic charge is calculated on the excess above £175,000, not £325,000.</p>'},
  {id:'10yr',cat:'tax',color:'#dc2626',title:'10-year periodic charge',summary:'IHT charged on the trust\'s value every 10 years — up to 6%.',
   body:'<p>Every 10 years from the date the trust was established, HMRC charges IHT on the value of the relevant property in the trust. The maximum effective rate is 6%, but most trusts pay significantly less.</p><p>The calculation works in 4 steps:</p><p><strong>Step 1:</strong> Work out the hypothetical chargeable transfer — the trust\'s current value plus any capital distributions made since the last 10-year anniversary.</p><p><strong>Step 2:</strong> Deduct the available nil-rate band (NRB minus settlor\'s prior CLTs from 7 years before trust was set up).</p><p><strong>Step 3:</strong> Calculate the "lifetime tax" on the excess at 20%, then find the effective rate: lifetime tax ÷ hypothetical transfer.</p><p><strong>Step 4:</strong> The periodic charge rate = effective rate × 30%. Tax due = periodic charge rate × current trust value.</p>',
   example:'<p><strong>Step-by-step worked example:</strong></p><p>Trust value today: £600,000. No prior CLTs. No capital distributions. NRB: £325,000.</p><p>Step 1 — Hypothetical transfer: £600,000</p><p>Step 2 — Excess over NRB: £600,000 − £325,000 = £275,000</p><p>Step 3 — Lifetime tax: £275,000 × 20% = £55,000. Effective rate: £55,000 ÷ £600,000 = 9.167%</p><p>Step 4 — Periodic rate: 9.167% × 30% = 2.75%. Tax due: £600,000 × 2.75% = <strong>£16,500</strong></p>'},
  {id:'exit',cat:'tax',color:'#dc2626',title:'Exit charge',summary:'IHT charged when capital leaves the trust between anniversaries.',
   body:'<p>When capital leaves a discretionary trust — through a capital distribution to a beneficiary, or a transfer of property out of the trust — HMRC charges an exit charge. It is a proportion of the most recent 10-year periodic charge rate, scaled by how many complete quarters have elapsed since the last 10-year anniversary (or, before the first anniversary, since the trust was set up).</p><p>Exit charge rate = periodic charge rate × (quarters elapsed ÷ 40). If the trust has been running for 23 quarters since the last anniversary, the exit rate is 23/40 of the periodic charge rate.</p><p>Exit charges apply only to <strong>capital</strong> leaving the trust. Income distributions do not trigger an exit charge — they may, however, trigger income tax obligations and require an R185 certificate.</p>',
   example:'<p>Trust periodic charge rate: 2.75%. 18 quarters have passed since the last anniversary. A capital distribution of £100,000 is made.</p><p>Exit rate = 2.75% × (18/40) = 2.75% × 0.45 = <strong>1.238%</strong></p><p>Exit charge = £100,000 × 1.238% = <strong>£1,238</strong></p>'},
  {id:'cgt',cat:'tax',color:'#dc2626',title:'Capital Gains Tax for trusts',summary:'Trusts pay 24% CGT on gains above a £1,500 annual exempt amount.',
   body:'<p>When a trust disposes of a capital asset (sells shares, sells property, transfers assets to a beneficiary), any gain above the base cost is subject to Capital Gains Tax.</p><p>For 2025/26 the rate is a flat <strong>24%</strong> for all assets (following the October 2024 Autumn Budget, which equalised the residential and non-residential rates).</p><p>The <strong>Annual Exempt Amount (AEA)</strong> for trusts is £1,500, shared across all trusts created by the same settlor, with a minimum of £300 per trust if there are five or more.</p><p>Losses can be offset against gains in the same year, with any excess carried forward. When assets are distributed from a discretionary trust to a beneficiary, <strong>s.260 hold-over relief</strong> may be available — meaning no immediate CGT is payable and the beneficiary inherits the trust\'s base cost instead.</p><p>Residential property disposals must be reported online and any CGT paid within <strong>60 days</strong> of completion, not just at the annual SA900.</p>',
   example:'<p>A trust (one of three trusts created by the same settlor) sells shares for a gain of £8,000. AEA = £1,500 ÷ 3 = £500. Taxable gain = £8,000 − £500 = £7,500. CGT = £7,500 × 24% = <strong>£1,800</strong>.</p>'},
  {id:'income-tax',cat:'tax',color:'#dc2626',title:'Trust income tax rates',summary:'Discretionary trusts pay 45% on income, 39.35% on dividends — before distributions.',
   body:'<p>The tax rate on trust income depends on the type of trust:</p><p><strong>Discretionary trusts:</strong> Pay the Rate Applicable to Trusts — 45% on non-savings and savings income, 39.35% on dividend income. The first £1,000 of trust income is taxed at the basic rate (20% / 8.75% on dividends) — this is the Standard Rate Band. Only income above £1,000 is taxed at the higher rate.</p><p><strong>Interest in possession trusts:</strong> Trustees pay basic rate (20% on non-savings income, 8.75% on dividends). The life tenant then declares the gross income on their own Self Assessment and pays any additional tax due at their own marginal rate.</p><p><strong>Bare trusts:</strong> Transparent — the beneficiary is taxed directly at their own rates as if they received the income themselves.</p>',
   example:'<p>A discretionary trust receives £8,000 of rental income. First £1,000 at 20% = £200. Remaining £7,000 at 45% = £3,150. Total tax = <strong>£3,350</strong>. Net income retained = £4,650. When distributed to a beneficiary, they receive credit for all £3,350 of tax paid.</p>'},
  {id:'seven-year',cat:'tax',color:'#dc2626',title:'The 7-year rule',summary:'Gifts made more than 7 years before death fall outside the IHT net.',
   body:'<p>Under the 7-year rule, Potentially Exempt Transfers (PETs) — outright gifts between individuals — become fully exempt from IHT if the donor survives 7 years after making them. Between years 3 and 7, taper relief reduces the IHT due.</p><p>CLTs (gifts into discretionary trusts) work differently. They are immediately chargeable when made. After 7 years they fall out of the donor\'s cumulative total, freeing up nil-rate band for future CLTs or the person\'s estate on death.</p><p>For trust calculations, the relevant question is: what CLTs did the settlor make in the <strong>7 years before setting up this trust</strong>? Those reduce the NRB available to the trust for periodic charges.</p>',
   example:''},
  {id:'bpr',cat:'tax',color:'#dc2626',title:'Business Property Relief (BPR)',summary:'Qualifying business assets can reduce or eliminate IHT charges.',
   body:'<p>Business Property Relief can reduce the taxable value of qualifying assets by either 50% or 100% for IHT purposes. This applies to periodic charges, exit charges, and entry charges on the portion of trust assets that qualify.</p><p><strong>100% relief</strong>: unquoted shares, a business or interest in a business (e.g. a partnership share).</p><p><strong>50% relief</strong>: shares in a quoted company where the transferor has voting control, or assets used in a business or by a company in which the transferor has a controlling interest.</p><p>The asset must generally have been held for at least 2 years. HMRC can challenge BPR where the business\'s main activity is holding or dealing in investments.</p>',
   example:''},
  {id:'apr',cat:'tax',color:'#dc2626',title:'Agricultural Property Relief (APR)',summary:'Qualifying farmland and buildings can attract relief from IHT.',
   body:'<p>APR reduces the agricultural value of qualifying agricultural property by 50% or 100% for IHT purposes, including periodic and exit charges on trust assets.</p><p><strong>100% relief</strong>: owner-occupied farmland, or land let on a tenancy beginning on or after 1 September 1995 (or earlier tenancies where the landlord has been entitled to vacant possession within the last 12 months).</p><p><strong>50% relief</strong>: other agricultural tenancies.</p><p>Only the agricultural value attracts relief. Any additional development value or other non-agricultural value is not covered by APR (though BPR may apply to some of it).</p>',
   example:''},
  {id:'settlor-interested',cat:'tax',color:'#dc2626',title:'Settlor-interested trust rules',summary:'If the settlor can benefit from the trust, HMRC taxes income on them — not the trust.',
   body:'<p>A trust is "settlor-interested" if the settlor, their spouse or civil partner, or their minor unmarried children can benefit from the trust assets or income — even potentially or indirectly.</p><p>Under ITTOIA 2005 s.624, all trust income is treated as the settlor\'s own income for tax purposes. Instead of the trust paying 45%, the income is added to the settlor\'s personal income and taxed at their marginal rate. This can dramatically change the tax position — better if the settlor is a non-taxpayer; worse if they are an additional-rate taxpayer with no trust rate credit to offset.</p><p>This is an easy rule to trigger accidentally — for example, if the deed allows trustees to add the settlor as a beneficiary, or if the settlor retained the power to appoint assets back to themselves.</p>',
   example:''},

  // DISTRIBUTIONS
  {id:'income-dist',cat:'distributions',color:'#059669',title:'Income distribution',summary:'Paying out trust income to beneficiaries — carries a tax credit they can use.',
   body:'<p>When a discretionary trust distributes income to a beneficiary, the payment carries a <strong>tax credit</strong> equal to the tax the trustees have already paid. This is the "gross-up" mechanism.</p><p>Because trustees pay 45% on non-savings income, a beneficiary receiving a net payment of £550 is treated as having received £1,000 gross income with £450 of tax paid on their behalf. A higher-rate taxpayer would owe nothing further. A basic-rate taxpayer would owe 20% − 0% (tax credits cover it). A non-taxpayer could reclaim the difference.</p><p>Trustees must issue an <strong>R185 (Certificate of Deduction of Income Tax)</strong> to every beneficiary who receives an income distribution. This certificate shows the gross amount and the tax credit, which the beneficiary needs to complete their own tax return.</p>',
   example:'<p>A trust distributes £5,500 net income to a beneficiary. Tax already paid by trustees at 45% on £10,000 gross = £4,500. Gross-up: £5,500 ÷ (1 − 0.45) = £10,000 gross. Tax credit on R185: £4,500.</p><p>If the beneficiary is a basic-rate taxpayer (20%), their liability on £10,000 = £2,000. Tax credit = £4,500. Repayable by HMRC: <strong>£2,500</strong>.</p>'},
  {id:'capital-dist',cat:'distributions',color:'#059669',title:'Capital distribution',summary:'Paying out capital from the trust — may trigger an exit charge.',
   body:'<p>A capital distribution is a payment to a beneficiary out of the trust\'s capital rather than its income. This could be cash, or the transfer of a physical asset (property, shares).</p><p>Capital distributions from discretionary trusts may trigger an <strong>exit charge</strong> — a proportionate IHT charge based on the time elapsed since the last 10-year anniversary. The trustees calculate and pay this before or at the time of the distribution.</p><p>Capital distributions do not carry a tax credit in the same way income distributions do. However, if the trust transfers a capital asset to a beneficiary, this is a disposal for CGT purposes unless <strong>s.260 hold-over relief</strong> is claimed — which defers the gain and passes the base cost to the beneficiary.</p>',
   example:''},
  {id:'r185',cat:'distributions',color:'#059669',title:'R185 — Certificate of income tax',summary:'Must be issued to beneficiaries who receive income distributions.',
   body:'<p>Form R185 (officially "Certificate of Income Tax Deducted") is a certificate that trustees must give to every beneficiary who receives an income distribution from the trust in a tax year. It shows the gross amount of income treated as having been paid, and the amount of income tax already deducted.</p><p>Beneficiaries need the R185 to complete their own Self Assessment tax return. Without it, they cannot claim credit for the tax already paid by the trustees, and HMRC may assess them on the gross amount again.</p><p>The deadline for issuing R185 certificates is <strong>5 July</strong> following the end of the tax year in which the distribution was made. There is no specific HMRC form to complete online — trustees create the certificate from the trust accounts, and it must be signed. HMRC provides a template on gov.uk.</p>',
   example:''},
  {id:'s31',cat:'distributions',color:'#059669',title:'Trustee Act 1925 s.31 — Maintenance',summary:'Power to use income for the maintenance of minor beneficiaries.',
   body:'<p>Section 31 of the Trustee Act 1925 gives trustees a statutory power to apply income arising in the trust for the <strong>maintenance, education or benefit</strong> of a minor beneficiary. This applies unless the trust deed expressly excludes or modifies it.</p><p>Income not applied for a minor\'s maintenance is accumulated. When the minor reaches 18 (or marries before then), accumulated income becomes their absolute entitlement as capital.</p><p>This power is useful for will trusts holding money for children — trustees can pay school fees, living expenses, or other costs from income without making a formal capital advancement. The decision and amount should be documented in the decision log.</p>',
   example:''},
  {id:'s32',cat:'distributions',color:'#059669',title:'Trustee Act 1925 s.32 — Advancement',summary:'Power to advance up to half of a beneficiary\'s share before they are entitled.',
   body:'<p>Section 32 gives trustees a statutory power to advance up to <strong>half of a beneficiary\'s presumptive share</strong> of capital before they are entitled to receive it. This applies unless the trust deed excludes or extends the power.</p><p>An advancement is a capital payment made early — for example, giving a beneficiary funds to buy a house or start a business before the trust would otherwise distribute. If the beneficiary later receives their full entitlement, the advancement is taken into account.</p><p>The advancement must be for the beneficiary\'s benefit. Trustees should record the reasoning in the decision log. Prior consent of any beneficiary with a prior interest (e.g. a life tenant) is required.</p>',
   example:''},

  // COMPLIANCE
  {id:'trs',cat:'compliance',color:'#1e40af',title:'Trust Registration Service (TRS)',summary:'All UK trusts must be registered — and updated within 90 days of changes.',
   body:'<p>The Trust Registration Service is HMRC\'s online register of trusts. Since 1 September 2022, most UK trusts must register, including non-taxable trusts — not just those with a tax liability. Trusts that are registered with the Charity Commission and bare trusts holding assets for up to two years are among the exempt categories.</p><p>You register (or manage registrations) at the TRS portal on gov.uk. You will need the trust\'s details, information on the settlor, all trustees, and all beneficial owners (beneficiaries with a fixed entitlement, and the class description for discretionary trusts).</p><p>After initial registration, you must update the register within <strong>90 days</strong> of any relevant change — new trustees, change of beneficiary details, change of trust address, etc. Failure to register or keep the register up to date can result in penalties. HMRC can issue a £100 penalty for non-registration.</p>',
   example:''},
  {id:'sa900',cat:'compliance',color:'#1e40af',title:'SA900 Trust and Estate Tax Return',summary:'The annual tax return for trusts — due 31 October (paper) or 31 January (online).',
   body:'<p>SA900 is the annual Self Assessment tax return for trusts and estates. It covers all income received by the trust in the tax year (6 April to 5 April), and any capital gains from disposals during the year.</p><p>The deadlines are: <strong>31 October</strong> for paper returns, <strong>31 January</strong> for online filing. Any tax due must also be paid by 31 January. Late filing incurs an automatic £100 penalty, rising with further delay.</p><p>The SA900 requires supplementary pages depending on the trust\'s activity: income (SA901), capital gains (SA904), non-residence (SA906), and others. Trustees are responsible for filing even if they use an accountant — the accountability rests with the trustees.</p><p>Simple trusts with no tax liability (e.g. a bare trust below the reporting threshold) may not need to file, but check with HMRC or a tax adviser.</p>',
   example:''},
  {id:'iht100',cat:'compliance',color:'#1e40af',title:'IHT100 — Reporting chargeable events',summary:'File with HMRC within 6 months of a 10-year anniversary or exit charge.',
   body:'<p>Form IHT100 is the return trustees must submit to HMRC when a chargeable IHT event occurs in the trust. The main events are: a 10-year periodic charge, an exit charge on a capital distribution, or a change in the beneficial interests that triggers a charge.</p><p>The IHT100 must be submitted within <strong>6 months of the end of the month in which the chargeable event occurred</strong>. The tax due must also be paid by this deadline — late payment incurs interest.</p><p>A filing is only required if the chargeable transfer (the hypothetical transfer used in the periodic charge calculation) exceeds <strong>80% of the nil-rate band</strong> (currently 80% × £325,000 = £260,000). Below this threshold, trustees still calculate whether any tax is due, but do not need to file a return.</p>',
   example:'<p>A trust had its 10-year anniversary on 15 March 2025. IHT100 must be filed and tax paid by <strong>30 September 2025</strong> (6 months from the end of March). If the hypothetical transfer was £220,000 (below 80% of £325,000 = £260,000), no return is needed even though the charge was calculated.</p>'},
  {id:'ta2000',cat:'compliance',color:'#1e40af',title:'Trustee Act 2000 — Duty of care',summary:'Trustees must act with reasonable care and skill in all they do.',
   body:'<p>The Trustee Act 2000 introduced a statutory duty of care: trustees must exercise such care and skill as is reasonable in the circumstances, having regard to any special knowledge or experience they have (or hold themselves out as having). Professional trustees are held to a higher standard.</p><p>The duty of care applies to: exercising investment powers, acquiring land, appointing agents and nominees, reviewing those appointments, and insuring trust assets.</p><p>Practically, this means trustees should: take appropriate advice before making significant investment decisions; document the reasoning behind major decisions (the decision log in this app is designed for exactly this); review investments at reasonable intervals; and not simply do nothing with trust assets.</p>',
   example:''},
  {id:'sic',cat:'compliance',color:'#1e40af',title:'Standard investment criteria',summary:'Trustees must consider suitability and diversification when investing.',
   body:'<p>Section 4 of the Trustee Act 2000 sets out the standard investment criteria that trustees must apply when exercising any investment power: (1) the suitability of the proposed investment to the trust, and (2) the need for diversification of trust investments in so far as is appropriate to the circumstances.</p><p>Trustees must also periodically <strong>review</strong> the trust\'s investments and consider whether they remain suitable. There is no fixed interval prescribed by law, but annual review is the accepted standard.</p><p>Before investing, trustees should take proper advice from a person qualified to give it (s.5 TA 2000) — unless the trustees reasonably conclude that advice is unnecessary given the circumstances. This means documenting why no advice was sought when that decision is made.</p>',
   example:''},
  {id:'delegation',cat:'compliance',color:'#1e40af',title:'Delegation — Trustee Act 2000',summary:'Investment management can be delegated to a professional, but trustees remain responsible.',
   body:'<p>Trustees may delegate their asset management functions to an authorised agent under the Trustee Act 2000 (s.11–27). This typically means instructing a fund manager or financial adviser to manage the trust\'s investments on a discretionary basis.</p><p>Delegation must be in writing. Trustees must provide the agent with a <strong>policy statement</strong> setting out how they want the trust investments managed (objectives, risk appetite, restrictions). Trustees must then periodically review whether the arrangement and the agent\'s compliance with the policy statement remain appropriate.</p><p>Crucially: <strong>delegation does not remove liability</strong>. If trustees fail to review the agent\'s performance and the trust suffers loss, they can still be held personally liable. Keep records of every review.</p>',
   example:''},
];

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fm(n){return"\u00A3"+Number(n).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmi(n){return"\u00A3"+Math.round(Number(n)).toLocaleString("en-GB")}
function fd(d){if(!d)return"\u2014";return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
function tdy(){return new Date().toISOString().split("T")[0]}
function dbt(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
function opts(arr,sel){return arr.map(function(v){return'<option value="'+esc(v)+'"'+(v===sel?" selected":"")+'>'+esc(v)+'</option>'}).join("")}
function pct(n){return(n*100).toFixed(2)+"%"}

// ============================================================
// QUERY HELPERS
// ============================================================
function gt(){return S.trusts.find(function(t){return t.id===AT})||null}
function gbe(){return S.beneficiaries.filter(function(b){return b.trustId===AT})}
function gtr(){return S.trustees.filter(function(t){return t.trustId===AT})}
function gdi(){return S.distributions.filter(function(d){return d.trustId===AT}).sort(function(a,b){return new Date(b.date)-new Date(a.date)})}
function gdc(){return S.decisions.filter(function(d){return d.trustId===AT}).sort(function(a,b){return new Date(b.date)-new Date(a.date)})}
function gin(){return S.income.filter(function(i){return i.trustId===AT})}
function gex(){return S.expenses.filter(function(e){return e.trustId===AT})}
function gga(){return S.gains.filter(function(g){return g.trustId===AT})}
function bna(id){var b=gbe().find(function(v){return v.id===id});return b?b.name:"Unknown"}
// Days since the current value was last updated (null if never stamped / no value)
function valueStaleDays(trust){
  if(!trust)return null;
  if(!Number(trust.currentValue||0))return null; // nothing to keep current
  if(!trust.valueUpdatedAt)return null;
  return dbt(trust.valueUpdatedAt,tdy());
}
function findItem(type,id){var map={trust:"trusts",beneficiary:"beneficiaries",trustee:"trustees",distribution:"distributions",decision:"decisions",income:"income",expense:"expenses",gain:"gains"};var key=map[type];if(!key)return{};var item=S[key].find(function(v){return v.id===id});return item?JSON.parse(JSON.stringify(item)):{}}

// ============================================================
// ONBOARDING PROGRESS
// ============================================================
function obSteps(){
  var t=gt();
  var hasTrust=S.trusts.length>0;
  var hasPeople=hasTrust&&(gbe().length>0||gtr().length>0);
  var hasMoney=hasTrust&&(gin().length>0||gdi().length>0);
  var hasDec=hasTrust&&gdc().length>0;
  var steps=[
    // Step 1: ALWAYS active and clickable — never auto-ticked just because data exists.
    // Opens trust creation modal. When a trust exists, CTA changes to "Edit / add another".
    {n:1,title:'Set up your trust',desc:'Enter the trust name, type, value and date it was established. This unlocks all the other features.',done:false,alwaysActive:true,onclick:"om('trust')",cta:hasTrust?'Edit trust or add another \u2192':'Create your trust \u2192'},
    {n:2,title:'Add trustees & beneficiaries',desc:'Record who manages the trust and who benefits from it. This is a legal requirement under the TRS.',done:hasPeople,onclick:hasTrust?"sv2('people')":"om('trust')",cta:hasTrust?'Go to People \u2192':'Complete step 1 first'},
    {n:3,title:'Record income & distributions',desc:'Track money coming in and payments going out to beneficiaries, including the tax position on each distribution.',done:hasMoney,onclick:hasTrust?"sv2('accounts')":'',cta:hasTrust?'Go to Accounts \u2192':'Complete step 1 first'},
    {n:4,title:'Log trustee decisions',desc:'Document every significant decision with your reasoning. This is your Trustee Act 2000 paper trail — essential if decisions are ever challenged.',done:hasDec,onclick:hasTrust?"sv2('decisions')":'',cta:hasTrust?'Go to Decisions \u2192':'Complete step 1 first'},
    {n:5,title:'Stay on top of deadlines',desc:'SA900, IHT100, TRS updates, R185 certificates — see every compliance deadline for this trust in one place.',done:false,alwaysActive:true,onclick:hasTrust?"sv2('dates')":'',cta:hasTrust?'View Compliance Calendar \u2192':'Complete step 1 first'}
  ];
  var next=-1;
  for(var i=0;i<steps.length;i++){if(!steps[i].done&&!steps[i].alwaysActive){next=i;break;}}
  if(next===-1&&hasTrust)next=4;
  return{steps:steps,next:next,hasTrust:hasTrust};
}

// ============================================================
// TAX CALCULATIONS
// ============================================================
// calcDistTax now accepts an optional bandUsed (how much of the £1,000
// standard rate band earlier income in the year has already consumed).
function calcDistTax(dist,trust,bandUsed){
  var amt=Number(dist.amount),type=dist.distType||"Income - Non-Savings",tType=trust.type||"Discretionary";
  bandUsed=Number(bandUsed||0);
  if(tType==="Bare")return{grossUp:amt,taxCredit:0,rate:0,note:"Bare trust: beneficiary taxed at own rates."};
  if(type==="Capital")return{grossUp:amt,taxCredit:0,rate:0,note:"Capital distribution. May trigger exit charge."};

  // Settlor-interested: income is taxed on the settlor at their marginal rate,
  // NOT at trust rates. No standard trust gross-up / R185 tax credit applies.
  if(trust.settlorInterested){
    return{grossUp:amt,taxCredit:0,rate:0,settlorInterested:true,
      note:"Settlor-interested trust: this income is taxed on the SETTLOR at their marginal rate, not at the trust rate. Report on the settlor's Self Assessment — do not issue a standard R185 tax credit."};
  }

  var isDiv=(type==="Income - Dividends");
  var trustRate=isDiv?0.3935:0.45;       // rate applicable to trusts
  var basicRate=isDiv?0.0875:0.20;       // standard rate band rate

  // IIP / Life interest: basic rate only, life tenant declares gross. (SRB not relevant.)
  if(tType==="Interest in Possession"||tType==="Life Interest"){
    var r=basicRate;
    return{grossUp:amt,taxCredit:amt*r,rate:r,note:tType+": trustees pay "+pct(r)+". Life tenant declares gross on SA."};
  }

  // Discretionary / Mixed: apply the standard rate band.
  // The first £1,000 of trust income (across the year) is taxed at basicRate,
  // the remainder at trustRate. We gross up the NET distribution accordingly.
  if(tType==="Discretionary"||tType==="Mixed"){
    var bandLeft=Math.max(0,1000-bandUsed);
    // To find the gross income this net amount represents, split the gross into
    // the part still within the band and the part above it.
    // Solve: net = grossInBand*(1-basicRate) + grossAbove*(1-trustRate)
    // where grossInBand <= bandLeft.
    var netIfAllBand=bandLeft*(1-basicRate);
    var gross,taxCredit;
    if(amt<=netIfAllBand){
      // Entire distribution sits within the standard rate band
      gross=amt/(1-basicRate);
      taxCredit=gross-amt;
      return{grossUp:gross,taxCredit:taxCredit,rate:basicRate,bandGrossUsed:gross,
        note:"Within the \u00A31,000 standard rate band. Taxed at "+pct(basicRate)+". Gross: "+fm(gross)+". Issue R185."};
    }
    // Part in band, part above
    var grossInBand=bandLeft;
    var netInBand=grossInBand*(1-basicRate);
    var netAbove=amt-netInBand;
    var grossAbove=netAbove/(1-trustRate);
    gross=grossInBand+grossAbove;
    taxCredit=gross-amt;
    var blendedRate=gross>0?taxCredit/gross:trustRate;
    return{grossUp:gross,taxCredit:taxCredit,rate:blendedRate,bandGrossUsed:grossInBand,
      note:"\u00A3"+Math.round(grossInBand)+" used the standard rate band at "+pct(basicRate)+", the rest at "+pct(trustRate)+". Gross: "+fm(gross)+". Issue R185."};
  }

  // Fallback
  var rate=trustRate;
  return{grossUp:amt,taxCredit:amt*rate,rate:rate,note:tType+": trustees pay "+pct(rate)+"."};
}
function calcCGT(trust){
  var gains=gga(),st=Number(trust.settlorTrusts||1),fullAEA=1500;
  var aea=st>=5?Math.max(300,fullAEA/st):fullAEA/st;
  var tg=0,tl=0;
  gains.forEach(function(g){var a=Number(g.amount);if(a>=0)tg+=a;else tl+=Math.abs(a)});
  var net=Math.max(0,tg-tl),taxable=Math.max(0,net-aea),tax=taxable*0.24;
  return{tg:tg,tl:tl,net:net,aea:Math.round(aea*100)/100,taxable:taxable,tax:tax,lc:Math.max(0,tl-tg),st:st};
}
function calc10Y(trust){
  var val=Number(trust.currentValue||trust.initialValue||0),clts=Number(trust.settlorPriorCLTs||0);
  var avNRB=Math.max(0,NRB-clts);
  var capDist=gdi().filter(function(d){return(d.distType||"")==="Capital"}).reduce(function(s,d){return s+Number(d.amount)},0);
  var hyp=val+capDist,excess=Math.max(0,hyp-avNRB);
  var taxLife=excess*0.20,effRate=hyp>0?taxLife/hyp:0,perRate=effRate*0.3,taxDue=val*perRate;
  return{val:val,clts:clts,avNRB:avNRB,capDist:capDist,hyp:hyp,excess:excess,effRate:effRate,perRate:perRate,taxDue:taxDue,needsReturn:hyp>(NRB*0.8)};
}
function calcExit(trust,amt,date){
  var t=gt();if(!t||!t.established||!date)return null;
  var start=new Date(t.established),exit=new Date(date);
  var yrs=(exit-start)/(365.25*24*60*60*1000),dec=Math.floor(yrs/10);
  var pStart=new Date(start);if(dec>0)pStart.setFullYear(pStart.getFullYear()+dec*10);
  var days=(exit-pStart)/(24*60*60*1000),qtrs=Math.floor(days/91.3125);
  if(qtrs<1)return{tax:0,qtrs:0,rate:0,note:"First quarter — no exit charge."};
  if(qtrs>40)qtrs=40;
  var tenY=calc10Y(trust),exitRate=tenY.perRate*(qtrs/40),tax=Number(amt)*exitRate;
  return{tax:tax,qtrs:qtrs,rate:exitRate,note:dec===0?"Pre-first-anniversary rate.":"Based on last 10-year effective rate."};
}
function gs(){
  var t=gt();if(!t)return null;
  var ds=gdi(),ic=gin(),ex=gex(),bs=gbe();
  var tD=ds.reduce(function(s,d){return s+Number(d.amount)},0);
  var tI=ic.reduce(function(s,i){return s+Number(i.amount)},0);
  var tE=ex.reduce(function(s,e){return s+Number(e.amount)},0);
  var bal=Number(t.initialValue||0)+tI-tD-tE;
  var pb=bs.map(function(b){var bd=ds.filter(function(d){return d.beneficiaryId===b.id});return{id:b.id,name:b.name,total:bd.reduce(function(s,d){return s+Number(d.amount)},0)}});

    kd.push({date:yr+"-01-31",label:"SA900 Electronic + Payment ("+(yr-1)+"/"+yr+")",du:dbt(tdy(),yr+"-01-31"),type:"tax"});

window.handleImportFile=function(ev){
  var file=ev.target.files&&ev.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var parsed=JSON.parse(e.target.result);
      var incoming=parsed&&parsed.data?parsed.data:parsed; // accept wrapped or raw
      if(!incoming||!incoming.trusts){throw new Error('This does not look like a Trust Manager backup file.');}
      var counts=(incoming.trusts.length)+' trust'+(incoming.trusts.length===1?'':'s');
      var mode=confirm('Import '+counts+' from this backup?\n\nOK = MERGE with your current data (keeps everything, skips duplicates).\nCancel = choose Replace instead.');
      if(mode){
        mergeImport(incoming);
      } else {
        if(confirm('REPLACE everything instead?\n\nThis wipes your current data and loads only the backup. This cannot be undone.\n\nTip: export your current data first if unsure.')){
          replaceImport(incoming);
        } else {
          ev.target.value='';
          return;
        }
      }
    }catch(err){
      alert('Import failed: '+(err.message||'Invalid file.'));
    }
    ev.target.value=''; // reset so the same file can be re-selected
  };
  reader.readAsText(file);
};

function mergeImport(incoming){
  var keys=['trusts','beneficiaries','trustees','distributions','decisions','income','expenses','gains'];
  keys.forEach(function(k){
    if(!Array.isArray(incoming[k]))return;
    var existingIds={};
    S[k].forEach(function(item){existingIds[item.id]=true;});
    incoming[k].forEach(function(item){
      if(item&&item.id&&!existingIds[item.id])S[k].push(item);
    });
  });
  if(!AT&&S.trusts.length>0)AT=S.trusts[0].id;
  persistAll();
  CV=S.trusts.length>0?'dashboard':'home';
  R();
  alert('Import complete. Your records have been merged.');
}

function replaceImport(incoming){
  var keys=['trusts','beneficiaries','trustees','distributions','decisions','income','expenses','gains'];
  var fresh={trusts:[],beneficiaries:[],trustees:[],distributions:[],decisions:[],income:[],expenses:[],gains:[]};
  keys.forEach(function(k){if(Array.isArray(incoming[k]))fresh[k]=incoming[k];});
  S=fresh;
  AT=S.trusts.length>0?S.trusts[0].id:null;
  persistAll();
  CV=S.trusts.length>0?'dashboard':'home';
  R();
  alert('Import complete. Your data has been replaced with the backup.');
}

// ============================================================
// STARTUP — dynamic Supabase load (works on GitHub Pages)
// ============================================================
function startApp(){
  var app=document.getElementById('app');
  if(app)app.innerHTML='<div style="padding:60px 20px;text-align:center;color:#64748b;font-family:system-ui,sans-serif"><div style="font-size:32px;margin-bottom:12px">\u2696</div><div style="font-size:15px;font-weight:600;color:#1e293b;margin-bottom:6px">Trust Manager</div><div style="font-size:13px">Loading\u2026</div></div>';

  if(!sbConfigured){init();return;}

  var script=document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  script.onload=function(){
    try{
      sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
      sb.auth.onAuthStateChange(function(event,session){
        if(event==='SIGNED_IN'&&session&&!currentUser){currentUser=session.user;authStep='form';loadFromCloud();}
        if(event==='SIGNED_OUT'){currentUser=null;S={trusts:[],beneficiaries:[],trustees:[],distributions:[],decisions:[],income:[],expenses:[],gains:[]};AT=null;R();}
      });
    }catch(e){console.warn('Supabase client failed:',e);sbConfigured=false;}
    init();
  };
  script.onerror=function(){console.warn('Supabase failed to load — local mode');sbConfigured=false;init();};
  document.head.appendChild(script);
}

async function init(){
  if(sbConfigured&&sb){
    try{
      var res=await sb.auth.getSession();
      if(res.data&&res.data.session){currentUser=res.data.session.user;await loadFromCloud();return;}
    }catch(e){console.warn('Session check failed:',e);}
  }
  try{var s=localStorage.getItem(SK);if(s){var p=JSON.parse(s);Object.keys(S).forEach(function(k){if(p[k])S[k]=p[k]});if(S.trusts.length>0)AT=S.trusts[0].id}}catch(e){}
  R();
}

window.addEventListener('DOMContentLoaded',function(){
  try{startApp();}
  catch(e){
    console.error('Startup error:',e);
    var app=document.getElementById('app');
    if(app)app.innerHTML='<div style="padding:40px;text-align:center;font-family:system-ui,sans-serif"><p style="color:#dc2626;font-size:14px">Something went wrong loading Trust Manager.</p><p style="color:#64748b;font-size:12px;margin-top:8px">Try refreshing the page.</p></div>';
  }
});
</script>
